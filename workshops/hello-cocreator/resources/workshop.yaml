apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  # Keep this unique across the whole OTM catalog. The reconciler deploys it
  # as cc-<repo-slug>--<this-name>, so two repos can share a folder name, but
  # a clear, specific name avoids confusion.
  name: hello-cocreator
spec:
  title: "Hello, Co-Creator"
  description: "A minimal starter workshop. Copy this folder to begin your own."
  vendor: otm.io
  difficulty: beginner
  duration: 15m

  # NOTE: no `publish:` and no `workshop.files:` here.
  # The OTM reconciler is authoritative for the file source — it injects a git
  # source pointing at the blessed commit of THIS repo, scoped to this
  # workshop's folder. You do not need to know or set the commit SHA.
  workshop:
    image: ghcr.io/educates/educates-base-environment:3.7.1   # required: leave as-is (allowlisted)

  session:
    # --- These fields are governed by the OTM policy clamp. ---
    # Allowed for non-elevated co-creators: budget small|medium, role view,
    # only terminal/editor/slides apps, memory<=1Gi, storage<=2Gi.
    # See ../../CONTRIBUTING.md for the full allowed subset.
    namespaces:
      budget: small
      role: view
    applications:
      terminal:
        enabled: true
      editor:
        enabled: true
    resources:
      memory: "512Mi"
      storage: "1Gi"
