apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: auto-test
spec:
  title: "Auto-Deploy Test"
  description: "Proves a pushed folder auto-deploys via the Phase 1 runner."
  vendor: otm.io
  difficulty: beginner
  duration: 10m
  workshop:
    image: ghcr.io/educates/educates-base-environment:3.7.1
  session:
    namespaces:
      budget: small
      role: view
    applications:
      terminal: { enabled: true }
    resources:
      memory: "512Mi"
      storage: "1Gi"
