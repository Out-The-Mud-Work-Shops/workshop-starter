apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: second-sample
spec:
  title: "Second Sample"
  description: "A second starter workshop, here to demonstrate multi-workshop repos."
  vendor: otm.io
  difficulty: beginner
  duration: 15m

  # No publish:/files: — the OTM reconciler injects the git file source.
  workshop:
    image: ghcr.io/educates/educates-base-environment:3.7.1

  session:
    namespaces:
      budget: small
      role: view
    applications:
      terminal:
        enabled: true
      editor:
        enabled: true
    resources:
      memory: "512Mi"
      storage: "1Gi"
